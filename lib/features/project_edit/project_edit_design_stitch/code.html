<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sửa dự án - DAS OBM</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#acc7ff",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#404751",
                    "tertiary": "#2a5aa7",
                    "surface-container-highest": "#e0e3e5",
                    "primary-fixed": "#d1e4ff",
                    "on-surface": "#191c1e",
                    "background": "#f7f9fb",
                    "surface-bright": "#f7f9fb",
                    "on-secondary-fixed": "#001f28",
                    "on-primary-fixed-variant": "#00497c",
                    "on-tertiary-fixed": "#001a40",
                    "on-primary-fixed": "#001d36",
                    "secondary-fixed-dim": "#4ad6ff",
                    "secondary": "#00677f",
                    "surface-dim": "#d8dadc",
                    "on-secondary-fixed-variant": "#004e60",
                    "surface-variant": "#e0e3e5",
                    "secondary-container": "#35d4ff",
                    "surface-container": "#eceef0",
                    "on-tertiary-fixed-variant": "#064490",
                    "inverse-primary": "#9dcaff",
                    "surface-container-high": "#e6e8ea",
                    "on-primary-container": "#fdfcff",
                    "primary-fixed-dim": "#9dcaff",
                    "on-tertiary-container": "#fefcff",
                    "tertiary-fixed": "#d8e2ff",
                    "surface-tint": "#0061a2",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "on-error": "#ffffff",
                    "primary": "#005f9e",
                    "primary-container": "#0078c7",
                    "on-secondary": "#ffffff",
                    "tertiary-container": "#4773c2",
                    "inverse-surface": "#2d3133",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#eff1f3",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#c0c7d3",
                    "surface": "#f7f9fb",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#00586d",
                    "outline": "#707882",
                    "secondary-fixed": "#b6eaff",
                    "on-background": "#191c1e"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "stack-md": "24px",
                    "stack-lg": "48px",
                    "stack-sm": "8px",
                    "gutter-md": "16px",
                    "container-padding": "40px"
            },
            "fontFamily": {
                    "label-bold": ["Inter"],
                    "body-lg": ["Inter"],
                    "display-lg": ["Inter"],
                    "mono-sm": ["JetBrains Mono"],
                    "headline-lg-mobile": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "label-bold": ["14px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "mono-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
                    "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}],
                    "headline-lg": ["30px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #f7f9fb;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }
        .form-input-focus:focus {
            border-color: #005f9e;
            box-shadow: 0 0 0 3px rgba(0, 95, 158, 0.1);
            outline: none;
        }
        select {
            background-image: none !important;
        }
    </style>
</head>
<body class="bg-background text-on-surface">
<!-- Header -->
<header class="flex items-center justify-between px-gutter-md h-16 w-full bg-white fixed top-0 left-0 right-0 z-50 shadow-sm border-none">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface text-[24px]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface truncate">Sửa dự án</h1>
</div>
</header>
<!-- Main Content -->
<main class="max-w-lg mx-auto px-gutter-md pb-32" style="padding-top: 88px;">
<form class="space-y-6">
<!-- Tên dự án -->
<div class="space-y-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface flex items-center gap-1">
                    Tên dự án <span class="text-error">*</span>
</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline text-[20px]" data-icon="assignment">assignment</span>
<input class="w-full pl-10 pr-4 h-12 bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface form-input-focus transition-all" placeholder="Nhập tên dự án" required="" type="text" value="Nền tảng Công chức viên chức Quốc gia"/>
</div>
</div>
<!-- Trạng thái -->
<div class="space-y-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface">
                    Trạng thái
                </label>
<div class="relative">
<select class="w-full h-12 pl-4 pr-10 bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface form-input-focus appearance-none transition-all">
<option selected="" value="doing">Đang thực hiện</option>
<option value="pending">Tạm dừng</option>
<option value="done">Đã hoàn thành</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Quản lý dự án (PM) -->
<div class="space-y-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface">
                    Quản lý dự án (PM)
                </label>
<div class="relative">
<select class="w-full h-12 pl-4 pr-10 bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface form-input-focus appearance-none transition-all">
<option value="">-- Chọn --</option>
<option selected="" value="1">Nguyễn Văn A</option>
<option value="2">Trần Thị B</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Grid for Dates -->
<div class="grid grid-cols-2 gap-4">
<!-- Ngày bắt đầu -->
<div class="space-y-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface">
                        Ngày bắt đầu
                    </label>
<input class="w-full h-12 px-4 bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface form-input-focus transition-all" type="date" value="2026-06-17"/>
</div>
<!-- Ngày kết thúc -->
<div class="space-y-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface">
                        Ngày kết thúc
                    </label>
<input class="w-full h-12 px-4 bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface form-input-focus transition-all" type="date"/>
</div>
</div>
<!-- Ghi chú -->
<div class="space-y-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface">
                    Ghi chú
                </label>
<textarea class="w-full p-4 bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface form-input-focus transition-all min-h-[120px]" placeholder="Nhập ghi chú chi tiết về dự án..."></textarea>
</div>
</form>
</main>
<!-- Fixed Bottom Action -->
<nav class="fixed bottom-0 left-0 right-0 p-gutter-md bg-white border-t border-outline-variant z-50">
<div class="max-w-lg mx-auto">
<button class="w-full py-4 bg-primary text-on-primary rounded-lg font-label-bold text-label-bold active:scale-[0.98] transition-all shadow-md">
                Lưu
            </button>
</div>
</nav>
<!-- Toast Notification -->
<div class="fixed top-20 left-1/2 -translate-x-1/2 bg-green-100 text-green-800 px-6 py-3 rounded-full flex items-center gap-2 shadow-lg transform translate-y-[-100px] opacity-0 transition-all duration-300 z-[100]" id="toast">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-bold text-label-bold">Dự án đã được cập nhật thành công</span>
</div>
<script>
        const saveBtn = document.querySelector('nav button');
        const toast = document.getElementById('toast');

        saveBtn.addEventListener('click', () => {
            const originalText = saveBtn.innerText;
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px]" data-icon="sync">sync</span> Đang lưu...';
            
            setTimeout(() => {
                saveBtn.innerText = originalText;
                toast.classList.remove('translate-y-[-100px]', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
                
                setTimeout(() => {
                    toast.classList.add('translate-y-[-100px]', 'opacity-0');
                    toast.classList.remove('translate-y-0', 'opacity-100');
                }, 3000);
            }, 800);
        });

        // Icon color interaction
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.replace('text-outline', 'text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.replace('text-primary', 'text-outline');
            });
        });
    </script>
</body></html>

<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DAS OBM - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "brand-blue": "#2185d5",
                        "surface-dim": "#d8dadc",
                        "outline-variant": "#c0c7d3",
                        "surface-variant": "#e0e3e5",
                        "on-secondary-container": "#00586d",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#fefcff",
                        "on-surface-variant": "#404751",
                        "on-secondary-fixed-variant": "#004e60",
                        "on-primary-container": "#fdfcff",
                        "on-error-container": "#93000a",
                        "on-background": "#191c1e",
                        "error-container": "#ffdad6",
                        "background": "#f7f9fb",
                        "tertiary": "#2a5aa7",
                        "surface-bright": "#f7f9fb",
                        "on-tertiary-fixed": "#001a40",
                        "inverse-surface": "#2d3133",
                        "secondary": "#00677f",
                        "outline": "#707882",
                        "secondary-fixed": "#b6eaff",
                        "tertiary-container": "#4773c2",
                        "surface-container-high": "#e6e8ea",
                        "secondary-container": "#35d4ff",
                        "inverse-primary": "#9dcaff",
                        "on-tertiary": "#ffffff",
                        "primary": "#005f9e",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        "error": "#ba1a1a",
                        "primary-container": "#0078c7",
                        "surface-tint": "#0061a2",
                        "on-primary-fixed": "#001d36",
                        "on-tertiary-fixed-variant": "#064490",
                        "on-secondary-fixed": "#001f28",
                        "tertiary-fixed-dim": "#acc7ff",
                        "secondary-fixed-dim": "#4ad6ff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#00497c",
                        "surface-container": "#eceef0",
                        "surface": "#f7f9fb",
                        "tertiary-fixed": "#d8e2ff",
                        "surface-container-low": "#f2f4f6",
                        "primary-fixed": "#d1e4ff",
                        "inverse-on-surface": "#eff1f3",
                        "primary-fixed-dim": "#9dcaff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-lg": "48px",
                        "stack-sm": "8px",
                        "gutter-md": "16px",
                        "stack-md": "24px",
                        "container-padding": "40px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "mono-sm": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "label-bold": ["Inter"],
                        "display-lg": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .bg-dot-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-hidden">
<!-- Splash Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center p-container-padding overflow-hidden">
<!-- Background Layer -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-surface"></div>
<div class="absolute inset-0 bg-dot-pattern opacity-20"></div>
</div>
<!-- Center Content: Typography Focus -->
<div class="z-10 flex flex-col items-center text-center max-w-2xl">
<div class="fade-in-up flex flex-col items-center" style="animation-delay: 0.1s;">
<!-- Main Branding -->
<h1 class="font-black text-[64px] md:text-[80px] text-brand-blue tracking-tighter leading-none mb-6">
                    DAS OBM
                </h1>
<!-- Sub-headline -->
<div class="mb-8">
<h2 class="font-bold text-lg md:text-xl text-on-surface-variant uppercase tracking-widest leading-tight">
                        HỆ THỐNG QUẢN TRỊ CƠ HỘI &amp; ĐIỀU HÀNH KINH DOANH
                    </h2>
</div>
<!-- Slogan -->
<p class="font-medium italic text-xl md:text-2xl text-secondary opacity-90 mb-12">
                    "Đồng hành kiến tạo hành chính số"
                </p>
</div>
</div>
<!-- Bottom Content: Footer Attribution -->
<div class="absolute bottom-12 z-10 w-full flex flex-col items-center fade-in-up" style="animation-delay: 0.5s;">
<div class="flex flex-col items-center space-y-2 opacity-50">
<span class="font-mono-sm text-[11px] uppercase tracking-widest text-outline">
                    ENTERPRISE EDITION V4.0
                </span>
<p class="font-label-sm text-sm text-on-surface-variant">
                    Powered by <span class="font-bold text-primary">Trung tâm DAS</span>
</p>
</div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle fade in effect completion log
            setTimeout(() => {
                console.log("DAS OBM Interface Ready.");
            }, 1000);
        });
    </script>
</body></html>

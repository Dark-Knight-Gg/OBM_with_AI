<style>
        body {
            background: #f7f9fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .bg-login-gradient {
            background: linear-gradient(135deg, #005f9e 0%, #0078c7 50%, #35d4ff 100%);
            position: relative;
            overflow: hidden;
        }
        .dot-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .card-shadow {
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.08), 0px 2px 10px rgba(0, 0, 0, 0.04);
        }
        .btn-gradient {
            background: linear-gradient(90deg, #005f9e 0%, #35d4ff 100%);
            transition: all 0.2s ease;
        }
        .btn-gradient:active {
            transform: scale(0.98);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-md text-on-surface">
<!-- Global Background Wrapper -->
<main class="flex-grow flex flex-col items-center justify-center relative w-full px-gutter-md py-stack-lg bg-login-gradient">
<!-- Background Dot Pattern Overlay -->
<div class="absolute inset-0 dot-pattern opacity-40 pointer-events-none"></div>
<!-- Animated atmospheric element -->
<div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2"></div>
<!-- Login Container -->
<div class="w-full max-w-[480px] z-10">
<!-- Brand Logo (Contextual) -->
<div class="flex flex-col items-center mb-stack-md text-center">
<h1 class="text-on-primary font-headline-lg text-headline-lg font-black tracking-tight leading-none mb-2">DAS</h1>
<p class="text-on-primary/80 font-label-sm text-label-sm tracking-wide uppercase">Đồng hành kiến tạo hành chính số</p>
</div>
<!-- Main Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-container-padding card-shadow w-full">
<div class="text-center mb-stack-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-sm">Đăng nhập</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Vui lòng đăng nhập để tiếp tục</p>
</div>
<!-- Alert Message -->
<div class="flex items-center gap-2 bg-[#D1E7DD] text-[#0f5132] px-4 py-3 rounded-lg mb-stack-md">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<p class="font-label-sm text-label-sm">Bạn đã đăng xuất.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-md">
<!-- Email Field -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="email" placeholder="email@ttdas.vn" type="email" value="email@ttdas.vn">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Mật khẩu</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="password" placeholder="••••••••" type="password" value="********">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility</span>
</button></div>
</div><div class="flex items-center gap-2 mt-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">Ghi nhớ tài khoản</label>
</div>
<!-- Submit Button -->
<button class="btn-gradient w-full py-4 text-on-primary rounded-lg font-headline-md text-headline-md flex items-center justify-center gap-3 mt-stack-sm shadow-md" type="submit">
<span class="material-symbols-outlined">login</span>
<span>Đăng nhập</span>
</button>
</form>
<!-- Demo Credentials -->
<div class="mt-stack-md pt-stack-md border-t border-surface-variant text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1">Tài khoản demo:</p>
<code class="font-mono-sm text-mono-sm bg-surface-container px-3 py-1 rounded text-primary">admin@ttdas.vn / admin123</code>
</div>
</div>
</div>
</main>
<!-- Footer Area (Inherited from JSON/Context) -->
<footer class="w-full py-stack-md bg-transparent z-10">
<div class="flex flex-col items-center gap-stack-sm text-center px-gutter-md">
<p class="font-body-md text-body-md text-on-primary/60">© 2024 DAS - Hệ thống Quản trị Cơ hội &amp; Điều hành Kinh doanh</p>
<div class="flex gap-4">
<a class="font-label-bold text-label-bold text-on-primary/80 hover:text-on-primary transition-colors" href="#">Hỗ trợ</a>
<span class="text-on-primary/20">|</span>
<a class="font-label-bold text-label-bold text-on-primary/80 hover:text-on-primary transition-colors" href="#">Chính sách bảo mật</a>
</div>
</div>
</footer>
<!-- Micro-interactions Script -->
<script>
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> <span>Đang xử lý...</span>`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check</span> <span>Thành công</span>`;
                btn.classList.replace('btn-gradient', 'bg-green-600');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-green-600', 'btn-gradient');
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });

        // Floating label/focus logic via CSS is used, but could add focus effects here
    </script>
</body></html>
